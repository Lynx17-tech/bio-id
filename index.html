<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioID</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div class="login-container">
        <div class="login-box glass-panel">
            <div class="login-header">
                <i class='bx bx-fingerprint'></i>
                <h2>BioID Login</h2>
                <p>Biometric Recognition System</p>
                
                <!-- MOBILE APP PROMPT (Hidden by default) -->
                <div id="mobileAppPrompt" class="mobile-app-prompt" style="display: none; margin-top: 15px; background: rgba(44, 116, 179, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(44, 116, 179, 0.2);">
                    <p style="font-size: 12px; font-weight: 600; margin-bottom: 10px; color: #2C74B3;">Get the BioID App</p>
                    <div style="display: flex; gap: 8px; justify-content: center;">
                        <button id="pwaInstallBtn" class="btn-small" style="font-size: 11px; padding: 8px 12px; background: #2C74B3; color: white; border: none; border-radius: 6px; cursor: pointer;">
                            <i class='bx bx-plus-circle'></i> Add to Home
                        </button>
                        <a href="https://github.com/BJManalo/BioID/releases" target="_blank" class="btn-small" style="text-decoration: none; font-size: 11px; padding: 8px 12px; background: #06182C; color: white; border: none; border-radius: 6px; cursor: pointer;">
                            <i class='bx bxl-android'></i> Download APK
                        </a>
                    </div>
                </div>
                <p>Welcome back. Please enter your credentials.</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label>Username / Role ID</label>
                    <div class="input-field">
                        <i class='bx bx-user'></i>
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-field">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login">Log In</button>

                <div class="biometric-login-area" id="biometricLoginArea" style="margin-top: 20px; text-align: center; display: none;">
                    <p style="font-size: 12px; color: #A0A0A0; margin-bottom: 10px; opacity: 0.6;">— OR —</p>
                    <button type="button" id="biometricLoginBtn" style="width: 100%; padding: 12px; background: transparent; color: #64B5F6; border: 1.5px solid rgba(100, 181, 246, 0.4); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.3s ease;">
                        <i class='bx bx-fingerprint' style="font-size: 20px;"></i> Biometric Login
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="customAlert" class="custom-alert-overlay">
        <div class="custom-alert-box glass-panel">
            <div class="custom-alert-icon" id="customAlertIcon"></div>
            <h3 id="customAlertTitle">Alert</h3>
            <p id="customAlertMessage">Message goes here.</p>
            <button class="btn-alert" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="login-logic.js"></script>
    <script>
        // PWA SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        }

        // PWA INSTALL LOGIC
        let deferredPrompt;
        const installBtn = document.getElementById('pwaInstallBtn');
        const mobilePrompt = document.getElementById('mobileAppPrompt');

        // Only show if it's a mobile device
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            mobilePrompt.style.display = 'block';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                }
                deferredPrompt = null;
            } else {
                alert('To install: Tap the browser menu (three dots or share icon) and select "Add to Home Screen".');
            }
        });
    </script>
</body>

</html>
