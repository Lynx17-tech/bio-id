<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioID</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* PWA POPUP STYLES */
        .pwa-install-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .pwa-install-overlay.show {
            display: flex;
            opacity: 1;
        }

        .pwa-card {
            background: linear-gradient(145deg, #103155 0%, #06182C 100%);
            width: 90%;
            max-width: 360px;
            padding: 30px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .pwa-install-overlay.show .pwa-card {
            transform: translateY(0);
        }

        .pwa-icon-box {
            width: 80px;
            height: 80px;
            background: #2C74B3;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(44, 116, 179, 0.3);
        }

        .pwa-icon-box i {
            font-size: 45px;
            color: white;
        }

        .pwa-title {
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .pwa-desc {
            color: #94A3B8;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .pwa-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-install-now {
            background: #2C74B3;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-install-now:hover {
            background: #3685cc;
            transform: scale(1.02);
        }

        .btn-maybe-later {
            background: transparent;
            color: #94A3B8;
            border: none;
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>

</head>

<body>
    <div class="login-container">
        <div class="login-box glass-panel">
            <div class="login-header">
                <i class='bx bx-fingerprint'></i>
                <h2>BioID Login</h2>
                <p>Biometric Recognition System</p>
                

                <p>Welcome back. Please enter your credentials.</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label>Username / Role ID</label>
                    <div class="input-field">
                        <i class='bx bx-user'></i>
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-field">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login">Log In</button>

                <div class="biometric-login-area" id="biometricLoginArea" style="margin-top: 20px; text-align: center; display: none;">
                    <p style="font-size: 12px; color: #A0A0A0; margin-bottom: 10px; opacity: 0.6;">— OR —</p>
                    <button type="button" id="biometricLoginBtn" style="width: 100%; padding: 12px; background: transparent; color: #64B5F6; border: 1.5px solid rgba(100, 181, 246, 0.4); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.3s ease;">
                        <i class='bx bx-fingerprint' style="font-size: 20px;"></i> Biometric Login
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="customAlert" class="custom-alert-overlay">
        <div class="custom-alert-box glass-panel">
            <div class="custom-alert-icon" id="customAlertIcon"></div>
            <h3 id="customAlertTitle">Alert</h3>
            <p id="customAlertMessage">Message goes here.</p>
            <button class="btn-alert" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="login-logic.js?v=2"></script>

    <!-- PWA INSTALL POPUP -->
    <div id="pwaOverlay" class="pwa-install-overlay">
        <div class="pwa-card">
            <div class="pwa-icon-box">
                <i class='bx bx-fingerprint'></i>
            </div>
            <h3 class="pwa-title">BioID Mobile</h3>
            <p class="pwa-desc">Install our application for a faster, more secure biometric experience on your device.</p>
            <div class="pwa-actions">
                <button id="pwaInstallBtn" class="btn-install-now">Install Application</button>
                <button id="pwaCloseBtn" class="btn-maybe-later">Maybe Later</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Failed', err));
            });
        }

        // 2. Install Logic
        let deferredPrompt;
        const pwaOverlay = document.getElementById('pwaOverlay');
        const installBtn = document.getElementById('pwaInstallBtn');
        const closeBtn = document.getElementById('pwaCloseBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Show pop-up after a 2 second delay when page loads
            setTimeout(() => {
                if (pwaOverlay) pwaOverlay.classList.add('show');
            }, 2000);
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        pwaOverlay.classList.remove('show');
                    }
                    deferredPrompt = null;
                }
            });
        }

        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                pwaOverlay.classList.remove('show');
            });
        }

        window.addEventListener('appinstalled', () => {
            if (pwaOverlay) pwaOverlay.classList.remove('show');
            deferredPrompt = null;
        });
    </script>

</body>

</html>
